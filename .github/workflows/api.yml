name: API

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'docker/Dockerfile'
      - 'FplTool.sln'
      - '.github/workflows/api.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'docker/Dockerfile'
      - 'FplTool.sln'
      - '.github/workflows/api.yml'

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore FplTool.sln

      - name: Build
        run: dotnet build FplTool.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test FplTool.sln --no-build --configuration Release --verbosity normal

  cd:
    name: Deploy
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP via Workload Identity Federation
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/fpltool/api:${{ github.sha }} \
            -f docker/Dockerfile .

      - name: Push Docker image
        run: |
          docker push \
            ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/fpltool/api:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy fpltool-api \
            --image ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/fpltool/api:${{ github.sha }} \
            --region ${{ secrets.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --add-cloudsql-instances ${{ secrets.CLOUD_SQL_INSTANCE_CONNECTION_NAME }} \
            --set-secrets="ConnectionStrings__FplToolDb=fpltool-db-connection-string:latest,Jwt__SigningKey=fpltool-jwt-signing-key:latest,Google__ClientId=fpltool-google-client-id:latest,Fpl__FplEmail=fpltool-fpl-email:latest,Fpl__FplPassword=fpltool-fpl-password:latest" \
            --min-instances 0 \
            --max-instances 3 \
            --memory 512Mi \
            --cpu 1 \
            --port 8080
